<!-- Theme Toggle Button -->
<div id="theme-toggle" style="position: fixed; top: 1rem; right: 1rem; z-index: 9999;">
  <label for="toggle-switch" style="cursor: pointer; user-select: none;">
    <input type="checkbox" id="toggle-switch" aria-label="Toggle dark/light mode" />
    <span style="color: white; font-weight: bold; user-select: none;"> 🌙 / ☀️</span>
  </label>
</div>
